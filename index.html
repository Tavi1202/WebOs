<!DOCTYPE html>
<html>

  <body style="background-image: url('./Photos/Lego Background.webp'); font-family: 'Trebuchet MS', sans-serif; margin: 0">

    <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; background-color: #7c7c7c; opacity: 0.975;">

      <p style="margin: 0; font-size: 1.0rem;">Octavius's OS</p>

      <div style="text-align: right;">
        <p id="dateElement" style="margin: 0; line-height: 1.2;"></p>
        <p id="timeElement" style="margin: 0; line-height: 1.2;"></p>
      </div>
    </div>

    <div style="position:absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 8px; border: solid; width:fit-content; border-radius: 32px; background-color: #8cdcf7; text-align: center">

      <h1 style="margin:4px">Welcome to my OS</h1>

      <h2>Introduction</h2>

      <p>Hello, World!</p>

      <p>This is my Web OS 1 for stardance.</p>

      <P>It will be all about LEGO since that was my favorite childhood toy.</P>

      <img style="width:256px;height: 256px;border-radius:16px" src="./Photos/Lego Brick.jpg"><br>

      <a href="https://www.lego.com/en-us">Lego Website</a>

    </div>

    <script>

      setInterval(function () {
       const now = new Date();
       document.querySelector("#timeElement").innerHTML = now.toLocaleTimeString();
        document.querySelector("#dateElement").innerHTML = now.toLocaleDateString();
      }, 1000);

   </script>

  </body>

</html>
